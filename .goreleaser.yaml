version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/ekte
    binary: ekte
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "ekte_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: danskode
    name: ekte
  # release-please opretter selve releasen (med changelog); goreleaser tilføjer
  # blot binærerne til den eksisterende release frem for at oprette/overskrive den.
  mode: append

changelog:
  sort: asc
  filters:
    exclude:
      - "^Co-Authored-By"
