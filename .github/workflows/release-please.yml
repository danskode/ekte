name: Release

# Automatiserede, men bevidste releases:
# 1) release-please vedligeholder en release-PR (changelog + næste semver) ud fra
#    Conventional Commits på main. Når PR'en merges, oprettes tag + GitHub Release.
# 2) Et tag pushet af GITHUB_TOKEN udløser IKKE en ny workflow (GitHubs anti-rekursion),
#    så goreleaser kører i SAMME workflow, betinget af release-please-outputtet —
#    checker tagget ud og uploader binærer til den release release-please lige oprettede
#    (goreleaser kører i append-mode, jf. .goreleaser.yaml).

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Least-privilege: kun release-please-jobbet behøver PR-rettigheder.
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4

  goreleaser:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
